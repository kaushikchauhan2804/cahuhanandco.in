<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorized Portfolio | Premium Construction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; scroll-behavior: smooth; -webkit-user-select: none; user-select: none; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .img-wrapper { position: relative; overflow: hidden; border-radius: 4px; background: #1e293b; aspect-ratio: 16/10; border: 1px solid #334155; }
        .gallery-img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .gallery-img:hover { transform: scale(1.08); }
        #lightbox {
            display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.98); justify-content: center; align-items: center; padding: 20px;
        }
        #lightbox img { max-width: 100%; max-height: 90vh; border: 2px solid #f59e0b; box-shadow: 0 0 60px rgba(0,0,0,0.8); object-fit: contain; }
        .section-title { border-left: 4px solid #f59e0b; padding-left: 1rem; margin-bottom: 2rem; margin-top: 4rem; }
    </style>
</head>
<body>

    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="">
        <p class="absolute bottom-6 text-amber-500 font-bold uppercase tracking-widest text-[10px] bg-slate-900/80 px-4 py-2 rounded-full">Tap anywhere to close</p>
    </div>

    <header class="p-4 border-b border-slate-800 flex justify-between items-center sticky top-0 bg-slate-900/90 backdrop-blur-md z-50">
        <div class="flex items-center">
            <img src="https://i.postimg.cc/Js05dqDd/logo-jpg.jpg" alt="Logo" class="h-10 w-auto">
        </div>
        <a href="index.html" class="text-[9px] font-black border border-amber-500 text-amber-500 px-5 py-2 hover:bg-amber-500 hover:text-slate-900 transition-all uppercase tracking-widest">Back to Home</a>
    </header>

    <main class="max-w-7xl mx-auto py-12 px-6">
        <div class="mb-12">
            <h2 class="text-4xl md:text-5xl font-black uppercase italic mb-2 tracking-tighter text-amber-500">Project Portfolio</h2>
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.4em]">Categorized by Location & Site</p>
        </div>

        <section id="coimbatore">
            <div class="section-title">
                <h3 class="text-2xl font-black uppercase italic">INOX Coimbatore</h3>
                <p class="text-slate-500 text-[9px] uppercase tracking-widest">Tamil Nadu, India</p>
            </div>
            <div class="gallery-grid" id="grid-coimbatore"></div>
        </section>

        <section id="kolkata">
            <div class="section-title">
                <h3 class="text-2xl font-black uppercase italic">INOX Madhyam Gram</h3>
                <p class="text-slate-500 text-[9px] uppercase tracking-widest">Kolkata, West Bengal</p>
            </div>
            <div class="gallery-grid" id="grid-kolkata"></div>
        </section>

        <section id="southcity">
            <div class="section-title">
                <h3 class="text-2xl font-black uppercase italic">INOX South City</h3>
                <p class="text-slate-500 text-[9px] uppercase tracking-widest">West Bengal</p>
            </div>
            <div class="gallery-grid" id="grid-southcity"></div>
        </section>

        <section id="tumkur">
            <div class="section-title">
                <h3 class="text-2xl font-black uppercase italic">INOX Tumkur</h3>
                <p class="text-slate-500 text-[9px] uppercase tracking-widest">Karnataka, India</p>
            </div>
            <div class="gallery-grid" id="grid-tumkur"></div>
        </section>
    </main>

    <footer class="bg-slate-900 py-12 px-8 text-center border-t border-slate-800 mt-12">
        <p class="text-[9px] text-slate-500 uppercase tracking-widest">&copy; 2026 | Infrastructure Portfolio</p>
    </footer>

    <script>

                "https://i.postimg.cc/7GxMcTLn/INOX-Coimbatore-Tamilnadu-10.png", "https://i.postimg.cc/629LSGQQ/INOX-Coimbatore-Tamilnadu-2.png",

                "https://i.postimg.cc/BLMcGQ8C/INOX-Madhyam-Gram-Kolkata-4.png", "https://i.postimg.cc/r0QCLFdg/INOX-Madhyam-Gram-Kolkata-5.png",
                "https://i.postimg.cc/YGbfwq4R/INOX-Madhyam-Gram-Kolkata-6.png", "https://i.postimg.cc/ftBjhT38/INOX-Madhyam-Gram-Kolkata-7.png",

            ],
            tumkur: [
                "https://i.postimg.cc/9r4Pv2cR/INOX-Tumkur-Karnataka-10.png", "https://i.postimg.cc/147cCX15/INOX-Tumkur-Karnataka-2.png",
                "https://i.postimg.cc/YjDfn0BC/INOX-Tumkur-Karnataka-3.png", "https://i.postimg.cc/7btMshrf/INOX-Tumkur-Karnataka-4.png",
                "https://i.postimg.cc/QVYk4CZB/INOX-Tumkur-Karnataka-5.png", "https://i.postimg.cc/K4prqjhg/INOX-Tumkur-Karnataka-6.png",
                "https://i.postimg.cc/vD2LqTwV/INOX-Tumkur-Karnataka-7.png", "https://i.postimg.cc/t7vtSJGh/INOX-Tumkur-Karnataka-8.png",
                "https://i.postimg.cc/G9gJ7tnP/INOX-Tumkur-Karnataka-9.png", "https://i.postimg.cc/BPjD95fn/INOX-Tumkur-Karnataka.png"
            ]
        };

        function renderGallery(categoryId, imageArray) {
            const container = document.getElementById(`grid-${categoryId}`);
            imageArray.forEach((src) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'img-wrapper shadow-lg';
                const img = document.createElement('img');
                img.src = src;
                img.className = 'gallery-img';
                img.loading = 'lazy';
                img.onclick = () => {
                    document.getElementById('lightbox-img').src = src;
                    document.getElementById('lightbox').style.display = 'flex';
                };
                img.onerror = () => {
                    wrapper.innerHTML = `<div class="flex items-center justify-center h-full text-[8px] text-slate-600 font-bold uppercase p-4 text-center">Project Image Preview</div>`;
                };
                wrapper.appendChild(img);
                container.appendChild(wrapper);
            });
        }

        // Initialize all galleries
        renderGallery('coimbatore', projectData.coimbatore);
        renderGallery('kolkata', projectData.kolkata);
        renderGallery('southcity', projectData.southcity);
        renderGallery('tumkur', projectData.tumkur);

        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
